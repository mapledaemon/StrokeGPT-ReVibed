name: Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install Flask requests elevenlabs

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile-check Python
        run: python -m py_compile app.py strokegpt/*.py tests/*.py
