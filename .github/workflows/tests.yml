name: Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install Flask requests elevenlabs

      - name: Run unit tests
        run: |
          python -m unittest \
            test_audio_service.py \
            test_motion_control.py \
            test_configuration.py \
            test_handy_controller.py \
            test_motion_scripts.py \
            test_web_static_assets.py

      - name: Compile-check Python
        run: python -m py_compile app.py strokegpt/*.py test_*.py
